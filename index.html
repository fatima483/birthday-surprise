<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake</title>

<style>
/* Body and layout */
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(#0a0f1f, #1b2a49);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  animation: fadeIn 2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Cake (responsive fix only) */
.cake {
  position: relative;
  width: 80vw;
  max-width: 400px;
  height: 40vw;
  max-height: 200px;
  background: linear-gradient(to bottom, #2c3e50, #1a252f);
  border-radius: 25px;
  box-shadow: 0 20px 35px rgba(0,0,0,0.6);
}

/* keep your design */
.cream { position: absolute; top: -30%; width: 100%; height: 50%; background: linear-gradient(to bottom, #dfe6e9, #b2bec3); border-radius: 50px 50px 20px 20px; }
.cream::after { content: ""; position: absolute; top: 10%; left: 20%; width: 60%; height: 40%; background: rgba(255,255,255,0.4); border-radius: 20px; }

.drip { position: absolute; background: linear-gradient(#dfe6e9, #b2bec3); border-radius: 20px; }
.drip1 { width: 10%; height: 30%; left: 20%; top: 25%; }
.drip2 { width: 12%; height: 40%; left: 45%; top: 20%; }
.drip3 { width: 8%; height: 25%; right: 20%; top: 27%; }

.layer { position: absolute; width: 100%; height: 10%; background: rgba(255,255,255,0.1); border-radius: 5px; }
.layer1 { top: 35%; }
.layer2 { top: 65%; }
.layer3 { top: 95%; }

/* Candle */
.candle { position: absolute; top: -50%; left: 50%; transform: translateX(-50%); width: 5%; height: 40%; background: repeating-linear-gradient(#ecf0f1, #ecf0f1 8px, #3498db 8px, #3498db 16px); border-radius: 6px; }
.flame { position: absolute; top: -30%; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: radial-gradient(circle, #fff59d, #ff9800); border-radius: 50%; animation: flicker 0.4s infinite alternate, glow 1s infinite alternate; }

@keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.25); } }
@keyframes glow { 0% { box-shadow: 0 0 10px #ff9800; } 100% { box-shadow: 0 0 35px #ff9800; } }

/* TEXT (responsive fix) */
h2 {
  margin-top: 30px;
  color: #ecf0f1;
  font-size: clamp(24px, 5vw, 60px);
  text-align: center;
  width: 100%;
  padding: 0 10px;
  box-sizing: border-box;
  text-shadow: 0 0 15px #3498db, 0 0 25px #3498db;
}

.highlight {
  display: block;
}

p {
  color: #bdc3c7;
  font-size: clamp(16px, 4vw, 36px);
  text-align: center;
  text-shadow: 0 0 10px #1abc9c, 0 0 20px #1abc9c;
}

/* Hearts */
.heart {
  position: absolute;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}
.heart::before, .heart::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}
@keyframes float {
  0% { bottom: -20px; opacity: 1; }
  100% { bottom: 100%; opacity: 0; }
}

/* Music button (same) */
#music-icon {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 80px;
  height: 80px;
  background: rgba(52, 152, 219, 0.95);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="cake">
  <div class="cream"></div>
  <div class="drip drip1"></div>
  <div class="drip drip2"></div>
  <div class="drip drip3"></div>
  <div class="layer layer1"></div>
  <div class="layer layer2"></div>
  <div class="layer layer3"></div>
  <div class="candle"><div class="flame"></div></div>
</div>

<h2>
  Happy Birthday My
  <span class="highlight">Naughty Hassan 😝!</span>
</h2>

<p>lovak baby 💙</p>

<div id="music-icon">🎵</div>

<audio id="bg-music" loop>
  <source src="birthdaysong (online-audio-converter.com).mp3" type="audio/mpeg">
</audio>

<script>
// Audio
const audio = document.getElementById("bg-music");
const icon = document.getElementById("music-icon");

icon.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
});

// 💖 Hearts (FIXED)
function createHeart() {
  let heart = document.createElement("div");
  heart.classList.add("heart");

  let size = 15 + Math.random() * 15;
  heart.style.width = size + "px";
  heart.style.height = size + "px";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";

  let color = Math.random() > 0.5 ? "#ff4d4d" : "#3498db";
  heart.style.background = color;
  heart.style.boxShadow = "0 0 15px " + color;

  heart.innerHTML = `
    <div style="position:absolute;width:${size}px;height:${size}px;background:${color};border-radius:50%;top:-${size/2}px;"></div>
    <div style="position:absolute;width:${size}px;height:${size}px;background:${color};border-radius:50%;left:-${size/2}px;"></div>
  `;

  document.body.appendChild(heart);
}

// Initial hearts
for (let i = 0; i < 30; i++) createHeart();

// Click adds more
document.addEventListener("click", () => {
  for (let i = 0; i < 15; i++) createHeart();
});
</script>

</body>
</html>
